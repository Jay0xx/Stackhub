<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1F1F1F" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1F1F1F" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1F1F1F" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1F1F1F" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="100" y="220" width="64" height="64" rx="10" fill="#FFFFFF"/>
  <text x="132" y="266" font-family="system-ui, -apple-system, sans-serif"
        font-size="40" font-weight="700" fill="#000000"
        text-anchor="middle">S</text>

  <!-- Wordmark -->
  <text x="100" y="340" font-family="system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-2">
    StackHub
  </text>

  <!-- Tagline -->
  <text x="100" y="398" font-family="system-ui, -apple-system, sans-serif"
        font-size="26" fill="#666666">
    The central hub for Web3 developer tools
  </text>

  <!-- URL -->
  <text x="100" y="510" font-family="system-ui, -apple-system, sans-serif"
        font-size="20" fill="#333333" letter-spacing="0.5">
    stackhub.dev
  </text>
</svg>
